[build]
  publish = "."
  command = "cd netlify/functions && npm install"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/track"
  to = "/track.html"
  status = 200

[[redirects]]
  from = "/sizing"
  to = "/sizing.html"
  status = 200

[[redirects]]
  from = "/methodology"
  to = "/methodology.html"
  status = 200

[[redirects]]
  from = "/start"
  to = "/start.html"
  status = 200

[[redirects]]
  from = "/resources"
  to = "/resources.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Cache-Control = "public, max-age=3600"
